services:
  - type: web
    name: bakery-reservation
    runtime: python
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./bakery.db
      - key: PYTHON_VERSION
        value: "3.11"
