<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}パン屋予約システム{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><a href="/">🍞 パン屋予約</a></strong></li>
        </ul>
        <ul>
            {% if user %}
                <li><a href="/reservations">予約一覧</a></li>
                {% if user.is_admin %}
                    <li><a href="/admin">管理画面</a></li>
                {% endif %}
                <li>
                    <form method="post" action="/auth/logout" style="margin:0">
                        <button type="submit" class="outline secondary" style="margin:0;padding:0.25rem 0.75rem">ログアウト</button>
                    </form>
                </li>
            {% else %}
                <li><a href="/auth/login">ログイン</a></li>
                <li><a href="/auth/register">会員登録</a></li>
            {% endif %}
        </ul>
    </nav>

    <main class="container">
        {% if error %}
        <article aria-label="error" style="background: var(--pico-del-color); color: white; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem;">
            {{ error }}
        </article>
        {% endif %}
        {% if success %}
        <article aria-label="success" style="background: var(--pico-ins-color); color: white; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem;">
            {{ success }}
        </article>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>パン屋予約システム &copy; 2026</small>
    </footer>
</body>
</html>
