{% extends "base.html" %}
{% block title %}{{ "商品編集" if product else "新規商品" }} - パン屋予約{% endblock %}

{% block content %}
<h1>{{ "商品編集" if product else "新規商品追加" }}</h1>

<form method="post" action="{{ '/admin/products/' ~ product.id ~ '/edit' if product else '/admin/products/new' }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label for="name">商品名</label>
    <input type="text" id="name" name="name" required value="{{ product.name if product else '' }}">

    <label for="description">説明</label>
    <textarea id="description" name="description">{{ product.description if product else '' }}</textarea>

    <label for="price">価格（円）</label>
    <input type="number" id="price" name="price" min="0" step="10" required value="{{ '%.0f'|format(product.price) if product else '' }}">

    {% if product %}
    <fieldset>
        <label>
            <input type="checkbox" name="is_active" value="true" {{ "checked" if product.is_active }}>
            有効（商品一覧に表示）
        </label>
    </fieldset>
    {% endif %}

    <button type="submit">{{ "更新" if product else "追加" }}</button>
</form>

<p><a href="/admin/products">← 商品一覧に戻る</a></p>
{% endblock %}
