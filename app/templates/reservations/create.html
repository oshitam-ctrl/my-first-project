{% extends "base.html" %}
{% block title %}新規予約 - パン屋予約{% endblock %}

{% block content %}
<h1>新規予約</h1>

<form method="post" action="/reservations/new">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label for="product_id">商品を選択</label>
    <select id="product_id" name="product_id" required>
        <option value="">-- 選択してください --</option>
        {% for product in products %}
        <option value="{{ product.id }}" {% if selected_product_id == product.id %}selected{% endif %}>
            {{ product.name }} (¥{{ "%.0f"|format(product.price) }})
        </option>
        {% endfor %}
    </select>

    <label for="quantity">数量</label>
    <input type="number" id="quantity" name="quantity" min="1" max="20" value="1" required>

    <label for="pickup_date">受取日</label>
    <input type="date" id="pickup_date" name="pickup_date" min="{{ min_date }}" max="{{ max_date }}" required>

    <label for="pickup_time">受取時間</label>
    <select id="pickup_time" name="pickup_time" required>
        <option value="09:00">09:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
    </select>

    {% if availability %}
    <details open>
        <summary>在庫状況</summary>
        <table>
            <thead><tr><th>日付</th><th>残り</th></tr></thead>
            <tbody>
                {% for date, qty in availability.items() %}
                <tr>
                    <td>{{ date }}</td>
                    <td>{{ qty }}個</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </details>
    {% endif %}

    <button type="submit">予約する</button>
</form>

<p><a href="/">← 商品一覧に戻る</a></p>
{% endblock %}
